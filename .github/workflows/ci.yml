name: ci

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  ci:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install the 1Password CLI so Dagger's built-in op:// secret
      # provider can resolve references directly. OAuth values are
      # never written to $GITHUB_ENV — they live only inside Dagger's
      # Secret abstraction once resolved.
      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      # ---- Linux suite ----

      - name: Codegen drift check
        if: matrix.os == 'ubuntu-latest'
        uses: dagger/dagger-for-github@v8.4.1
        with:
          verb: call
          args: codegen-check --source=.
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Analyze
        if: matrix.os == 'ubuntu-latest'
        uses: dagger/dagger-for-github@v8.4.1
        with:
          verb: call
          args: analyze --source=.
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Test
        if: matrix.os == 'ubuntu-latest'
        uses: dagger/dagger-for-github@v8.4.1
        with:
          verb: call
          args: >-
            test
            --source=.
            --oauth-client-id=op://homelab/bookmarks/oauth_client_id
            --oauth-client-secret=op://homelab/bookmarks/oauth_client_secret
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        uses: dagger/dagger-for-github@v8.4.1
        with:
          verb: call
          args: >-
            build-linux
            --source=.
            --oauth-client-id=op://homelab/bookmarks/oauth_client_id
            --oauth-client-secret=op://homelab/bookmarks/oauth_client_secret
            export
            --path=./build-linux-output
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: bookmarks-linux-${{ github.sha }}
          path: ./build-linux-output
          retention-days: 14

      # ---- Windows suite ----

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        uses: dagger/dagger-for-github@v8.4.1
        with:
          verb: call
          args: >-
            build-windows
            --source=.
            --oauth-client-id=op://homelab/bookmarks/oauth_client_id
            --oauth-client-secret=op://homelab/bookmarks/oauth_client_secret
            export
            --path=./build-windows-output
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: bookmarks-windows-${{ github.sha }}
          path: ./build-windows-output
          retention-days: 14
