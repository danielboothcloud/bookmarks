name: ci

on:
  pull_request: {}
  push:
    branches: [main, develop]

jobs:
  ci:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Linux suite ----

      - name: Codegen drift check
        if: matrix.os == 'ubuntu-latest'
        uses: dagger/dagger-for-github@v8.4.1
        with:
          verb: call
          args: codegen-check --source=.

      - name: Analyze
        if: matrix.os == 'ubuntu-latest'
        uses: dagger/dagger-for-github@v8.4.1
        with:
          verb: call
          args: analyze --source=.

      - name: Test
        if: matrix.os == 'ubuntu-latest'
        uses: dagger/dagger-for-github@v8.4.1
        with:
          verb: call
          args: test --source=.

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        uses: dagger/dagger-for-github@v8.4.1
        with:
          verb: call
          args: build-linux --source=. export --path=./build-linux-output

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: bookmarks-linux-${{ github.sha }}
          path: ./build-linux-output
          retention-days: 14

      # ---- Windows suite ----

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        uses: dagger/dagger-for-github@v8.4.1
        with:
          verb: call
          args: build-windows --source=. export --path=./build-windows-output

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: bookmarks-windows-${{ github.sha }}
          path: ./build-windows-output
          retention-days: 14
