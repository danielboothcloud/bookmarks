[tools]
dagger = "latest"
flutter = { version = "3.41.9", platforms = { linux-x64 = { url = "https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_{{ version }}-stable.tar.xz" }, macos-arm64 = { url = "https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_arm64_{{ version }}-stable.zip" }, macos-x64 = { url = "https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_{{ version }}-stable.zip" }, windows-x64 = { url = "https://storage.googleapis.com/flutter_infra_release/releases/stable/windows/flutter_windows_{{ version }}-stable.zip" } }, version_expr = 'fromJSON(body).releases | filter({ #.channel == "stable" }) | map({ replace(#.version, "-stable", "") }) | sortVersions()', version_list_url = "https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json" }
"gem:cocoapods" = "latest"
ruby = "3.3"

# `mise run dev` — start the macOS desktop app with Google Drive OAuth
# credentials injected from client-creds.json (gitignored). The
# constants land in `lib/core/drive/oauth_config.dart` via
# `String.fromEnvironment` and are read by `DriveAuthService` at the
# token-exchange step.
[tasks.dev]
tools = { flutter = "3.41.9" }
description = "Run the macOS app with OAuth creds from client-creds.json"
run = '''
set -e
CREDS="${BOOKMARKS_CREDS_FILE:-client-creds.json}"
if [ ! -f "$CREDS" ]; then
  echo "error: $CREDS not found" >&2
  exit 1
fi
CLIENT_ID=$(jq -r .installed.client_id "$CREDS")
CLIENT_SECRET=$(jq -r .installed.client_secret "$CREDS")
flutter run -d macos \
  --dart-define=BOOKMARKS_OAUTH_CLIENT_ID="$CLIENT_ID" \
  --dart-define=BOOKMARKS_OAUTH_CLIENT_SECRET="$CLIENT_SECRET" \
  "$@"
'''

# `mise run test` — full pre-release verification via the Dagger
# pipeline: codegen drift check → static analyze → flutter test. Runs
# in containers, identical to CI. Build tasks depend on this passing.
[tasks.test]
tools = { dagger = "latest" }
description = "Codegen drift check + analyze + flutter test (via Dagger)"
run = '''
set -e
dagger call codegen-check --source=.
dagger call analyze --source=.
dagger call test --source=.
'''

# `mise run build-macos` — release-shaped local build for smoke runs
# (Task 22). Same credential injection.
[tasks.build-macos]
tools = { flutter = "3.41.9", ruby = "3.3", "gem:cocoapods" = "latest" }
depends = ["test"]
description = "Build the macOS app (debug) with OAuth creds injected"
run = '''
set -e
CREDS="${BOOKMARKS_CREDS_FILE:-client-creds.json}"
if [ ! -f "$CREDS" ]; then
  echo "error: $CREDS not found" >&2
  exit 1
fi
CLIENT_ID=$(jq -r .installed.client_id "$CREDS")
CLIENT_SECRET=$(jq -r .installed.client_secret "$CREDS")
flutter build macos --debug \
  --dart-define=BOOKMARKS_OAUTH_CLIENT_ID="$CLIENT_ID" \
  --dart-define=BOOKMARKS_OAUTH_CLIENT_SECRET="$CLIENT_SECRET"
'''

# `mise run build-linux` — release-shaped Linux build via the Dagger
# pipeline (`.dagger/main.go`). Same OAuth credential contract as the
# macOS task; the bundle lands in `./build/linux/x64/release/bundle/`.
[tasks.build-linux]
tools = { dagger = "latest" }
depends = ["test"]
description = "Build the Linux app (release) via Dagger with OAuth creds injected"
run = '''
set -e
CREDS="${BOOKMARKS_CREDS_FILE:-client-creds.json}"
if [ ! -f "$CREDS" ]; then
  echo "error: $CREDS not found" >&2
  exit 1
fi
export BOOKMARKS_OAUTH_CLIENT_ID=$(jq -r .installed.client_id "$CREDS")
export BOOKMARKS_OAUTH_CLIENT_SECRET=$(jq -r .installed.client_secret "$CREDS")
dagger call build-linux --source=. \
  --oauth-client-id=env://BOOKMARKS_OAUTH_CLIENT_ID \
  --oauth-client-secret=env://BOOKMARKS_OAUTH_CLIENT_SECRET \
  export --path=./build/linux/x64/release/bundle
'''

# `mise run build-windows` — release-shaped Windows build via Dagger.
# Requires a Windows host with Dagger Desktop (containerised Windows
# builds can't run on macOS/Linux). Bundle lands in
# `./build/windows/x64/runner/Release/`.
[tasks.build-windows]
tools = { dagger = "latest" }
depends = ["test"]
description = "Build the Windows app (release) via Dagger with OAuth creds injected"
run = '''
set -e
CREDS="${BOOKMARKS_CREDS_FILE:-client-creds.json}"
if [ ! -f "$CREDS" ]; then
  echo "error: $CREDS not found" >&2
  exit 1
fi
export BOOKMARKS_OAUTH_CLIENT_ID=$(jq -r .installed.client_id "$CREDS")
export BOOKMARKS_OAUTH_CLIENT_SECRET=$(jq -r .installed.client_secret "$CREDS")
dagger call build-windows --source=. \
  --oauth-client-id=env://BOOKMARKS_OAUTH_CLIENT_ID \
  --oauth-client-secret=env://BOOKMARKS_OAUTH_CLIENT_SECRET \
  export --path=./build/windows/x64/runner/Release
'''
