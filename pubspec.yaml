name: bookmarks
description: "Personal bookmark manager with Google Drive sync."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  # NOTE: riverpod_annotation/riverpod_generator temporarily removed due to
  # analyzer version conflict with drift_dev ^2.32.0. Re-add once ecosystems align.

  # Navigation
  go_router: ^17.2.2

  # Database
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Crypto (PKCE SHA-256)
  crypto: ^3.0.5

  # Security
  flutter_secure_storage: ^9.2.4

  # Google Drive (Epic 4)
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0

  # Network / connectivity
  connectivity_plus: ^6.1.4
  http: ^1.6.0

  # URL metadata (title, OG tags) -- favicon bytes fetched directly via http
  metadata_fetch: ^0.4.2

  # HTML parser — used to extract <link rel="icon"> hrefs for favicon
  # discovery (robustness fix). Already a transitive dep of metadata_fetch;
  # declared here because lib/ imports it directly.
  html: ^0.15.4

  # IDs
  uuid: ^4.5.1

  # Path utilities
  path: ^1.9.0
  path_provider: ^2.1.5

  # Desktop window management
  window_manager: ^0.5.1

  # URL launching (open bookmarks in the system default browser, AC4)
  url_launcher: ^6.3.1

  # Native OS file dialog for HTML import. Story 5.1.
  file_picker: ^8.1.4

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Used in tests to swap UrlLauncherPlatform.instance with a recording fake.
  url_launcher_platform_interface: ^2.3.2

  # Code generation
  build_runner: ^2.4.13
  drift_dev: ^2.32.0
  freezed: ^3.0.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
